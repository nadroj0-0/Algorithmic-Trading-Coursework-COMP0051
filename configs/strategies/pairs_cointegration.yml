# =============================================================================
# configs/strategies/pairs_cointegration.yml
# COMP0051 Algorithmic Trading Coursework
#
# Strategy 1: Rolling Engle-Granger cointegration pairs (BTC/ETH).
#
# Implementation (strategies.py PairsStrategy):
#   1. Rolling Engle-Granger cointegration test (statsmodels.coint) over
#      coint_window bars — identical to Notebook 3.5 pattern.
#      Signal is suppressed when p-value >= coint_pvalue_threshold.
#   2. Rolling OLS hedge ratio β over hedge_window bars.
#   3. Spread = log_BTC - β × log_ETH (cointegration residual).
#   4. Z-score of spread over zscore_window bars.
#   5. Trade when cointegrated: enter on |z| > entry_z, exit on |z| < exit_z,
#      stop on |z| > stop_z.
#
# Economic rationale:
#   BTC and ETH are both L1 protocols driven by shared macro factors (Fed
#   rates, BTC halving cycle, risk appetite). Their log prices are expected
#   to be cointegrated over monthly horizons. We exploit temporary deviations
#   from this long-run equilibrium relationship.
#
# Parameter justifications:
#   coint_window=720          : 30 days. Cointegration is regime-dependent;
#                               shorter windows produce noisy p-values.
#   coint_pvalue_threshold=0.05: Standard significance level (Notebook 3.5).
#   hedge_window=720          : Same horizon for β stability.
#   zscore_window=168         : 7 days. ACF of spread decays within this window.
#   entry_z=1.5               : Gatev-Goetzmann-Rouwenhorst (1999) threshold.
#   exit_z=0.5                : GGR (1999) exit — substantially reverted.
#   stop_z=3.0                : Prevents losses when pair decointegrates.
# =============================================================================

strategy_name: pairs_cointegration

params:
  # --- Cointegration test (Engle-Granger via statsmodels.coint) ---
  coint_window:           720       # rolling E-G test window (bars)
  coint_pvalue_threshold: 0.05      # max p-value to trade the spread

  # --- Hedge ratio estimation (OLS first step) ---
  hedge_window:           720       # OLS window for β (bars)

  # --- Spread z-score ---
  zscore_window:          168       # rolling z-score window (bars)
  entry_z:                1.5       # open position when |z| > entry_z
  exit_z:                 0.5       # close position when |z| < exit_z
  stop_z:                 3.0       # emergency close when |z| > stop_z

  # --- MVO position sizing ---
  solver:                 cvxopt_qp
  gross_cap:              100000    # max Σ|θ_i| — brief's hard constraint
  vol_target:             0.02      # target per-bar portfolio volatility
  mvo_lookback:           168       # rolling covariance window (bars)
  regularisation:         0.0001
  risk_aversion:          1.0       # λ — MVO return/risk trade-off
  mu_lookback:            168       # rolling window for expected return μ

  # --- Capital and slippage (injected by run.py from experiment.yml) ---
  # initial_capital and slippage are set at runtime — do not edit here.

best_config: {}

search_space:
  coint_window:           [480, 1440, uniform]    # 20–60 days
  coint_pvalue_threshold: [0.01, 0.10, uniform]   # significance level
  zscore_window:          [72,  336,  uniform]    # 3–14 days
  entry_z:                [1.0, 2.5,  uniform]
  exit_z:                 [0.1, 0.8,  uniform]
  stop_z:                 [2.5, 4.0,  uniform]
  mvo_lookback:           [72,  336,  uniform]
  vol_target:             [0.01, 0.05, uniform]
